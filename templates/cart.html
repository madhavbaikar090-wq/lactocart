<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>Your Cart</h2>

{% if cart_items %}

    {% for item in cart_items %}
        <p>{{ item['name'] }} - ₹{{ item['price'] }}</p>
    {% endfor %}

    <h3>Total ₹{{ total }}</h3>

    <a href="/payment">
        <button>Proceed To Payment</button>
    </a>

{% else %}

    <p>Cart is empty</p>

{% endif %}

</body>
</html>
