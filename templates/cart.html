<link rel="stylesheet" href="/static/style.css">
{% include 'header.html' %}

<div class="container">

<h2>Your Cart</h2>

{% for item in cart_items %}

<p>
{{item.name}} - ₹{{item.price}} × {{item.qty}}

<a href="/inc/{{item.id}}">➕</a>
<a href="/dec/{{item.id}}">➖</a>
<a href="/remove/{{item.id}}">❌</a>

</p>

{% endfor %}

<h3>Total ₹{{total}}</h3>

<a href="/payment">
<button>Proceed To Payment</button>
</a>

<br><br>

<a href="/shop">
<button>🛍️ Continue Shopping</button>
</a>

</div>
