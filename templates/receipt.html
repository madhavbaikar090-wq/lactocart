<link rel="stylesheet" href="/static/style.css">
{% include 'header.html' %}

<div class="receipt">

<h2>LactoCart Bill</h2>

<hr>

{% for item in cart_items %}
<p>{{item.name}} - ₹{{item.price}} × {{item.qty}}</p>
{% endfor %}

<hr>

<h3>Total: ₹{{total}}</h3>

<p>Payment: Cash on Delivery</p>
<p>Status: 🚚 On the way</p>

</div>
