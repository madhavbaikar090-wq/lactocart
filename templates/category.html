<link rel="stylesheet" href="/static/style.css">

{% include 'header.html' %}

<h2>{{category}}</h2>

{% for item in items %}
<div class="product">

<img src="/static/images/{{item.image}}">
<h3>{{item.name}}</h3>
<p>₹{{item.price}}</p>

<a href="/add/{{item.id}}">
<button>Add To Cart</button>
</a>

</div>
{% endfor %}

<a href="/cart">View Cart</a>
