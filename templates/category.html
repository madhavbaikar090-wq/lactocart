<link rel="stylesheet" href="/static/style.css">
{% include 'header.html' %}

<h2 style="text-align:center">{{category}}</h2>

<div class="grid">
{% for item in items %}
<div class="product">
<img src="/static/images/{{item.image}}">
<h3>{{item.name}}</h3>
<p>₹{{item.price}}</p>
<a href="/add/{{item.id}}"><button>Add to Cart</button></a>
</div>
{% endfor %}
</div>
